spring:
  # 声明为非 Web 应用：本模块是命令行演示(CommandLineRunner 跑完即退出)。
  # OpenAI starter 传递引入了 webflux，不声明会被误判为 reactive Web 应用而启动失败。
  main:
    web-application-type: none
  application:
    name: 07-advisors
  config:
    import:
      - "optional:file:../config/spring-ai-common.yml"
      - "optional:file:./config/spring-ai-common.yml"

# 把 Spring AI 内置的 advisor 日志级别调到 DEBUG，
# 这样 SimpleLoggerAdvisor 才会真正把"请求/响应"打印出来（默认 DEBUG 级别不显示）。
logging:
  level:
    org.springframework.ai.chat.client.advisor: DEBUG
