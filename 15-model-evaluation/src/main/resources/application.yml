spring:
  # 声明为非 Web 应用：本模块是命令行演示(CommandLineRunner 跑完即退出)。
  # OpenAI starter 传递引入了 webflux，不声明会被误判为 reactive Web 应用而启动失败。
  main:
    web-application-type: none
  application:
    name: 15-model-evaluation
  config:
    # 导入共享配置（DeepSeek 作为对话模型，同时充当“裁判”模型）。
    import:
      - "optional:file:../config/spring-ai-common.yml"
      - "optional:file:./config/spring-ai-common.yml"

# 日志配置：聚焦演示输出
logging:
  level:
    root: WARN
    com.example.springai: INFO
    org.springframework.ai: INFO
