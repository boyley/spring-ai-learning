spring:
  # ★ 覆盖共享配置里的 none：MCP Server 是真正的 Web 应用，必须以 servlet(Tomcat) 方式运行。
  #   本模块依赖里有 spring-boot-starter-web，这里声明 servlet 让它启动 Web 服务器。
  main:
    web-application-type: servlet
  application:
    name: 14-mcp
  config:
    # 导入共享配置（API Key、模型等只配一次）。两条 fallback 路径兼容“模块内/根目录”两种运行方式。
    import:
      - "optional:file:../config/spring-ai-common.yml"
      - "optional:file:./config/spring-ai-common.yml"

  # ============================================================================
  #  ★ MCP Server 配置（prefix: spring.ai.mcp.server）★
  #  这些属性由 spring-ai-starter-mcp-server-webmvc 自动读取，用于描述并启动 MCP Server。
  # ============================================================================
  ai:
    mcp:
      server:
        enabled: true            # 是否启用 MCP Server（默认 true）
        name: demo-weather-server # 服务器名字（客户端在握手时会看到，建议见名知意）
        version: 1.0.0           # 服务器版本号（同样在握手 initialize 阶段告知客户端）
        type: SYNC               # 服务器工作模式：SYNC（同步，简单）或 ASYNC（异步/响应式）
        instructions: "这是一个演示用的天气/时间工具服务器，提供 getWeather、getCurrentTime 两个工具。"
        # webmvc 变体默认使用 SSE+HTTP 传输，客户端连接的 SSE 端点路径（默认就是 /sse）：
        sse-endpoint: /sse

  # MCP Server 默认监听的 Web 端口（Spring Boot 标准属性）
server:
  port: 8090

# 日志配置：聚焦演示输出
logging:
  level:
    root: WARN
    com.example.springai: INFO
    org.springframework.ai: INFO
