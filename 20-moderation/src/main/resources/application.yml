spring:
  # 声明为非 Web 应用：本模块是命令行演示(CommandLineRunner 跑完即退出)。
  main:
    web-application-type: none
  application:
    name: 20-moderation
  config:
    # 导入共享配置。注意：审核走【真正的 OpenAI】，用的是共享配置里父级的
    # spring.ai.openai.base-url(https://api.openai.com) + OPENAI_API_KEY。
    import:
      - "optional:file:../config/spring-ai-common.yml"
      - "optional:file:./config/spring-ai-common.yml"

  # ============================================================================
  #  ★ 内容审核模型配置（prefix: spring.ai.openai.moderation）★
  #  这些属性由 OpenAiModerationAutoConfiguration 自动读取。
  #  审核没有在共享配置里单独配置，所以在本模块本地指定一下审核模型名即可。
  #  （base-url / api-key 会沿用父级，即真正的 OpenAI + OPENAI_API_KEY。）
  # ============================================================================
  ai:
    openai:
      moderation:
        options:
          # OpenAI 审核模型名。可选：
          #   omni-moderation-latest  → 最新多模态审核模型（推荐）
          #   text-moderation-latest  → 旧版纯文本审核模型
          model: omni-moderation-latest

# 日志配置：聚焦演示输出
logging:
  level:
    root: WARN
    com.example.springai: INFO
    org.springframework.ai: INFO
