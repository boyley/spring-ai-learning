spring:
  # 声明为非 Web 应用：本模块是命令行演示(CommandLineRunner 跑完即退出)。
  # OpenAI starter 传递引入了 webflux，不声明会被误判为 reactive Web 应用而启动失败。
  main:
    web-application-type: none
  application:
    name: 05-multimodality
  config:
    import:
      - "optional:file:../config/spring-ai-common.yml"
      - "optional:file:./config/spring-ai-common.yml"

  # ===========================================================================
  #  ★ 本模块专属：用本地配置"覆盖"共享配置里的 chat 能力 ★
  # ---------------------------------------------------------------------------
  #  为什么要覆盖？
  #    - 共享配置（config/spring-ai-common.yml）把 chat（对话）能力指向了 DeepSeek。
  #    - 但 DeepSeek 目前【不支持视觉/图片理解】，无法做多模态。
  #    - 本模块要"看图说话"，必须把 chat 能力切换到支持视觉的模型。
  #    - 这里改用【阿里通义千问 VL】视觉模型（百炼专属网关，OpenAI 兼容接口）。
  #
  #  覆盖是怎么生效的？
  #    - spring.config.import 导入的共享文件优先级较低；
  #    - 本文件（模块自己的 application.yml）里直接写的属性优先级更高，会覆盖同名属性。
  #    - 所以下面这段会把 chat 的 base-url / api-key / model 改成阿里通义千问的设置。
  #
  #  ★ 使用前：设置环境变量（不要把 Key 写进文件提交到 git，会泄露！）
  #        export DASHSCOPE_API_KEY=sk-ws-你的真实Key
  # ===========================================================================
  ai:
    openai:
      chat:
        # 阿里百炼专属网关的 OpenAI 兼容地址（注意：已含 /compatible-mode/v1 完整路径）
        base-url: https://llm-18qwefy46kq78xoy.cn-beijing.maas.aliyuncs.com/compatible-mode/v1
        # 从环境变量读取 Key，避免明文写入源码
        api-key: ${DASHSCOPE_API_KEY:请设置环境变量DASHSCOPE_API_KEY}
        options:
          # 通义千问视觉模型：qwen-vl-plus（便宜够用），要更强可换 qwen-vl-max
          model: qwen-vl-plus
