# =============================================================================
#  ★★★ 全局统一配置文件（整个项目只需要改这一个地方）★★★
# =============================================================================
#  说明：
#  - 16 个模块的 application.yml 都会通过 spring.config.import 导入本文件。
#  - 你只需要在这里填好 API Key，所有模块都能用，不用到处复制配置。
#
#  本项目模型策略（DeepSeek 为主 + OpenAI 兼容）：
#  - 我们统一使用 Spring AI 的【OpenAI starter】，因为 DeepSeek 的接口与 OpenAI 完全兼容。
#  - “对话(chat)”能力 → 把地址指向 DeepSeek（便宜、国内可直连）。
#  - “向量(embedding)/图片(image)/语音(audio)”能力 → DeepSeek 不支持，指向真正的 OpenAI。
#  - Spring AI 允许“按能力分别覆盖 base-url 和 api-key”，所以一个文件就能同时配好两家。
#
#  ★ 如何填 Key（二选一）：
#    方式A（推荐）：设置环境变量，然后什么都不用改这个文件：
#        export DEEPSEEK_API_KEY=sk-你的deepseek密钥
#        export OPENAI_API_KEY=sk-你的openai密钥
#    方式B：直接把下面的 ${DEEPSEEK_API_KEY:...} 里冒号后面的默认值替换成你的真实 Key。
#
#  ★ DeepSeek 申请地址：https://platform.deepseek.com/  （注册送额度）
#  ★ 只学对话相关模块（01~08、11、15）的话，只需要 DeepSeek 的 Key 就够了。
# =============================================================================

spring:
  ai:
    openai:
      # ---- 父级（默认）连接配置：用于 embedding / image / audio 等能力，指向真正的 OpenAI ----
      api-key: ${OPENAI_API_KEY:请在这里填入你的-OpenAI-Key或设置环境变量}
      base-url: https://api.openai.com

      # ---- chat（对话）能力：单独覆盖，指向 DeepSeek ----
      chat:
        # base-url 覆盖父级，指向 DeepSeek。Spring AI 会自动拼接 /v1/chat/completions
        base-url: https://api.deepseek.com
        # api-key 覆盖父级，使用 DeepSeek 的 Key
        api-key: ${DEEPSEEK_API_KEY:请在这里填入你的-DeepSeek-Key或设置环境变量}
        options:
          # 使用的模型名。DeepSeek 可选：
          #   deepseek-chat     → 通用对话模型（推荐入门用，速度快）
          #   deepseek-reasoner → 带推理链的深度思考模型（更慢更贵）
          model: deepseek-chat
          # temperature 采样温度（0~2）：越低回答越稳定/确定，越高越有创造性/随机。
          temperature: 0.7

      # ---- embedding（文本向量化）能力：指向真正的 OpenAI ----
      embedding:
        base-url: https://api.openai.com
        api-key: ${OPENAI_API_KEY:请在这里填入你的-OpenAI-Key或设置环境变量}
        options:
          # OpenAI 的向量模型，输出 1536 维向量
          model: text-embedding-3-small

      # ---- image（文生图）能力：指向真正的 OpenAI ----
      image:
        base-url: https://api.openai.com
        api-key: ${OPENAI_API_KEY:请在这里填入你的-OpenAI-Key或设置环境变量}
        options:
          model: dall-e-3

      # ---- audio 语音转文字（Whisper）能力：指向真正的 OpenAI ----
      audio:
        transcription:
          base-url: https://api.openai.com
          api-key: ${OPENAI_API_KEY:请在这里填入你的-OpenAI-Key或设置环境变量}
          options:
            model: whisper-1
        # ---- audio 文字转语音（TTS）能力：指向真正的 OpenAI ----
        speech:
          base-url: https://api.openai.com
          api-key: ${OPENAI_API_KEY:请在这里填入你的-OpenAI-Key或设置环境变量}
          options:
            model: tts-1

# 日志配置：让控制台少打印一些 INFO 噪音，聚焦在我们自己的演示输出上
logging:
  level:
    root: WARN
    com.example.springai: INFO          # 我们自己代码的日志保留 INFO
    org.springframework.ai: INFO        # Spring AI 的日志保留 INFO，方便观察
